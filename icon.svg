<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Outer Box Outline / Depth -->
  <g filter="url(#shadow)">
    <!-- Box Front Face Outline -->
    <path d="M128,160 L256,96 L384,160 L384,320 L256,384 L128,320 Z" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-width="12" stroke-linejoin="round" />
    <!-- Box Lines -->
    <path d="M128,160 L256,224 L384,160" fill="none" stroke="#ffffff" stroke-width="12" stroke-linejoin="round" />
    <path d="M256,224 L256,384" fill="none" stroke="#ffffff" stroke-width="12" stroke-linejoin="round" />
    
    <!-- Checklist Checkmark -->
    <path d="M200,270 L240,310 L320,210" fill="none" stroke="#34d399" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0px 4px 6px rgba(0,0,0,0.4))" />
  </g>
</svg>
